<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspections Notifications</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        #notifications {
            width: 90%;
            max-width: 600px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 15px;
            margin-top: 20px;
        }

        .notification {
            background-color: #eaf6ff;
            border-left: 5px solid #007BFF;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <h1>Live Inspections Notifications</h1>
    <div id="notifications">
        <p><em>Waiting for new inspections...</em></p>
    </div>

    <script>
        const notificationsDiv = document.getElementById("notifications");
        notificationsDiv.innerHTML = "";

        const eventSource = new EventSource("http://localhost:8080/inspections/stream");

        eventSource.onmessage = (event) => {
            const inspection = JSON.parse(event.data);

            const div = document.createElement("div");
            div.className = "notification";
            div.textContent = `Inspection ID: ${inspection.id} - Description: ${inspection.observations ?? 'No description'}`;

            notificationsDiv.prepend(div);
        };

        eventSource.onerror = () => {
            const div = document.createElement("div");
            div.className = "notification";
            div.style.backgroundColor = "#ffdddd";
            div.style.borderLeft = "5px solid #FF0000";
            div.textContent = "Connection lost, trying to reconnect...";
            notificationsDiv.prepend(div);
        };
    </script>
</body>
</html>
